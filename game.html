<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trio – Spielfeld</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

<div class="game-wrapper">

  <!-- ═══ Game Header ═══════════════════════════════════════════════════════ -->
  <header class="game-header">
    <a href="index.html" class="nav-logo" style="font-size:1.3rem">TRIO<span>.</span></a>
    <div class="room-info">
      <span class="room-label">Raum</span>
      <span class="room-code-badge" id="header-room-code">------</span>
      <span class="mode-badge simple" id="header-mode">Simple</span>
    </div>
    <div class="spacer"></div>
    <div class="turn-indicator" id="turn-indicator">
      <div class="turn-dot"></div>
      <span id="turn-indicator-name">Laden…</span>
    </div>
    <button id="btn-leave" class="btn btn-secondary" style="padding:0.4rem 1rem;font-size:0.85rem">
      ← Verlassen
    </button>
  </header>

  <!-- ═══ Main Game Area ════════════════════════════════════════════════════ -->
  <main class="game-main">

    <!-- Left sidebar: Opponents -->
    <aside class="game-sidebar" id="left-sidebar">
      <div class="sidebar-title">Mitspieler</div>
      <div id="opponents-container"></div>
    </aside>

    <!-- Center board -->
    <div class="game-board">

      <!-- Center pile -->
      <div class="center-pile-section">
        <div class="center-pile-title">
          Mittelpfeil —
          <span id="center-pile-count">0</span> verdeckte Karten
        </div>
        <div class="center-pile-grid" id="center-pile-grid"></div>
      </div>

      <!-- Revealed cards area (for showing asked cards) -->
      <div class="revealed-card-area" id="revealed-area" style="display:none">
        <span class="revealed-label">Aufgedeckt:</span>
        <div class="revealed-cards" id="revealed-cards"></div>
      </div>

      <!-- Action log (above hand) -->
      <div class="action-log" id="action-log">
        <div class="log-title">Spielverlauf</div>
        <div class="log-entry" style="color:rgba(255,255,255,0.3)">Warte auf Spielstart…</div>
      </div>

      <!-- My hand -->
      <div class="my-hand-section">
        <div class="my-hand-header">
          <div id="my-avatar" class="opp-avatar" style="width:36px;height:36px">?</div>
          <span class="my-hand-title">Deine Hand — <span id="my-name"></span></span>
          <span style="font-size:0.8rem;color:rgba(255,255,255,0.4)">
            <span id="my-trio-count">0</span> Trios
          </span>
        </div>
        <div class="my-cards" id="my-cards"></div>

        <!-- My collected trios -->
        <div class="my-trios-section hidden" id="my-trios-section">
          <div class="my-trios-label">Gewonnene Trios</div>
          <div class="trios-row" id="my-trios"></div>
        </div>
      </div>

    </div>

    <!-- Right sidebar: Statistics -->
    <aside class="game-sidebar right" id="right-sidebar">
      <div class="sidebar-title">Statistik</div>
      <div id="stats-container"></div>
      <div id="stat-rounds" style="margin-top:auto;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.08);font-size:0.8rem;color:rgba(255,255,255,0.35);font-weight:600"></div>
    </aside>

  </main>

  <!-- ═══ Footer / Action bar ═══════════════════════════════════════════════ -->
  <footer class="game-footer">
    <span class="action-hint" id="action-hint">Lade Spiel…</span>
  </footer>

</div>

<!-- ═══ Win Overlay ═══════════════════════════════════════════════════════ -->
<div class="win-overlay" id="win-overlay">
  <div class="win-card">
    <div class="win-emoji" id="win-emoji">🏆</div>
    <h2 id="win-winner-name"></h2>
    <p id="win-subtitle"></p>
    <div class="win-actions">
      <button class="btn btn-primary btn-lg" id="btn-ready">Bereit für nächste Runde</button>
      <button class="btn btn-secondary" id="btn-back-lobby">Zur Lobby</button>
    </div>
  </div>
</div>

<!-- ═══ Card Reveal Overlay ════════════════════════════════════════════════ -->
<div id="card-reveal-overlay" class="card-reveal-overlay">
  <div class="card-reveal-inner">
    <div class="card-reveal-label" id="reveal-label"></div>
    <div class="card-reveal-player">
      <div class="card-reveal-avatar" id="reveal-avatar"></div>
      <span class="card-reveal-name" id="reveal-name"></span>
    </div>
    <div class="game-card face-up reveal-big-card">
      <span class="corner tl" id="reveal-val-tl"></span>
      <span id="reveal-val-main"></span>
      <span class="corner br" id="reveal-val-br"></span>
    </div>
    <button class="btn btn-secondary reveal-skip-btn" id="reveal-skip-btn">Weiter →</button>
  </div>
</div>

<!-- ═══ Toast container ════════════════════════════════════════════════════ -->
<div id="toast-container" class="toast-container"></div>

<script type="module" src="js/game.js"></script>
</body>
</html>
